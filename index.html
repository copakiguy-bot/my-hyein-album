<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>나의 사진첩</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c0392b;
      --accent-light: #e8726a;
      --text: #2c2c2c;
      --muted: #888;
      --bg: #f7f5f2;
      --white: #ffffff;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── COVER ── */
    #cover {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      flex-direction: column;
      gap: 16px;
      border-bottom: 3px solid var(--accent);
    }

    #cover .cover-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    #cover h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 2.8rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    #cover .cover-line {
      width: 48px;
      height: 2px;
      background: var(--accent);
    }

    #cover .cover-sub {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── CHAPTER ── */
    .chapter {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 32px;
    }

    .chapter-header {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid #ddd;
    }

    .chapter-number {
      min-width: 110px;
    }

    .chapter-number .label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    .chapter-number .num {
      font-family: 'Noto Serif KR', serif;
      font-size: 3rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .chapter-divider {
      width: 1px;
      height: 80px;
      background: #ddd;
      margin-top: 4px;
    }

    .chapter-info {
      padding-top: 8px;
    }

    .chapter-date {
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .chapter-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .chapter-count {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── COLLAGE GRID ── */
    .collage {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* 패턴 A: 1큰 + 2작 (3장) */
    .collage.pattern-a {
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 260px 260px;
    }
    .collage.pattern-a .p0 { grid-row: 1 / 3; }

    /* 패턴 B: 상1 + 하2 (3장) */
    .collage.pattern-b {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 260px 200px;
    }
    .collage.pattern-b .p0 { grid-column: 1 / 3; }

    /* 패턴 C: 2+2 그리드 (4장) */
    .collage.pattern-c {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 240px 240px;
    }

    /* 패턴 D: 1큰 + 3작 (4장) */
    .collage.pattern-d {
      grid-template-columns: 3fr 1fr;
      grid-template-rows: 200px 200px 200px;
    }
    .collage.pattern-d .p0 { grid-row: 1 / 3; }

    /* 패턴 E: 1장 */
    .collage.pattern-e {
      grid-template-columns: 1fr;
      grid-template-rows: 400px;
    }

    /* 패턴 F: 2장 나란히 */
    .collage.pattern-f {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 300px;
    }

    /* 패턴 G: 5장 */
    .collage.pattern-g {
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: 220px 220px;
    }
    .collage.pattern-g .p0 { grid-row: 1 / 3; }

    /* 패턴 H: 6장 */
    .collage.pattern-h {
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 200px 200px;
    }

    /* 여러 장 (7+) */
    .collage.pattern-many {
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 180px;
    }

    .photo-cell {
      cursor: pointer;
      position: relative;
      background: #ddd;
      display: flex;
      flex-direction: column;
    }

    .photo-cell .photo-img-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .photo-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .photo-cell:hover img { transform: scale(1.04); }

    .photo-cell .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s;
    }
    .photo-cell:hover .overlay { background: rgba(0,0,0,0.08); }

    .photo-caption {
      background: #fff;
      padding: 6px 10px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
      border-top: 1px solid #eee;
      flex-shrink: 0;
    }

    /* chapter divider */
    .chapter-sep {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: #ccc;
      font-size: 0.75rem;
    }
    .chapter-sep::before, .chapter-sep::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #lightbox.active { display: flex; }

    #lightbox img {
      max-width: 88vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 2px;
    }

    #lb-info {
      color: #aaa;
      font-size: 0.82rem;
      margin-top: 14px;
      letter-spacing: 0.05em;
    }

    #lb-close {
      position: fixed;
      top: 22px; right: 28px;
      background: none; border: none;
      color: #fff; font-size: 1.8rem;
      cursor: pointer; line-height: 1;
    }

    .lb-nav {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: none; color: #fff;
      font-size: 2.2rem; cursor: pointer;
      padding: 14px 20px; border-radius: 4px;
      transition: background 0.2s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.18); }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    /* ── 로딩 / 에러 ── */
    #loading {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #aaa;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #ddd;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #setup-notice {
      max-width: 560px;
      margin: 80px auto;
      padding: 32px;
      background: #fff8f7;
      border-left: 4px solid var(--accent);
      display: none;
    }
    #setup-notice h2 { font-size: 1rem; margin-bottom: 12px; color: var(--accent); }
    #setup-notice code { background: #fef0ee; padding: 2px 6px; font-size: 0.82rem; border-radius: 3px; }

    #error-msg { text-align: center; padding: 80px; color: var(--accent); display: none; }

    /* footer */
    footer {
      text-align: center;
      padding: 48px;
      font-size: 0.75rem;
      color: #bbb;
      letter-spacing: 0.1em;
      border-top: 1px solid #e8e8e8;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <span class="cover-label">My Album</span>
  <div class="cover-line"></div>
  <h1 id="cover-title">나의 사진첩</h1>
  <div class="cover-line"></div>
  <span class="cover-sub" id="cover-sub"></span>
</div>

<div id="setup-notice">
  <h2>⚙️ 설정 필요</h2>
  <p>파일 상단 <code>CONFIG</code>에 <code>API_KEY</code>와 <code>FOLDER_ID</code>를 입력해주세요.</p>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>사진을 불러오는 중...</span>
</div>

<div id="error-msg">
  사진을 불러오지 못했어요.<br>
  <small id="error-detail"></small>
</div>

<div id="chapters"></div>

<footer id="footer" style="display:none">나의 사진첩</footer>

<!-- 라이트박스 -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <button class="lb-nav" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt="" />
  <div id="lb-info"></div>
  <button class="lb-nav" id="lb-next">›</button>
</div>

<script>
  // =============================================
  //  ✏️ 여기에 값을 입력하세요
  // =============================================
  const CONFIG = {
    API_KEY:   "AIzaSyBSNHvIbrMokYOp0ZaGXnKpe2xGNsEkv-M",           // 구글 API 키
    FOLDER_ID: "1dFIVSBoFIJCZiLFeQL4A_HTds2GndRUC",           // 구글 드라이브 폴더 ID
    TITLE:     "나의 사진첩", // 제목
    GROUP_BY:  "month"       // "month" 또는 "day" (날짜 묶음 기준)
  };
  // =============================================

  document.getElementById("cover-title").textContent = CONFIG.TITLE;
  document.title = CONFIG.TITLE;
  document.getElementById("footer").textContent = CONFIG.TITLE;

  const DAYS_KO = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
  const MONTHS_KO = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  let allPhotos = [];
  let flatPhotos = [];
  let currentLbIndex = 0;

  function formatGroupKey(dateStr) {
    const d = new Date(dateStr);
    if (CONFIG.GROUP_BY === "day") {
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    }
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}`;
  }

  function formatChapterTitle(key) {
    if (CONFIG.GROUP_BY === "day") {
      const d = new Date(key.replace(/\./g, "-"));
      return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${DAYS_KO[d.getDay()]}`;
    }
    const [y, m] = key.split(".");
    return `${y}년 ${parseInt(m)}월`;
  }

  function formatDateLabel(dateStr) {
    const d = new Date(dateStr);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${DAYS_KO[d.getDay()]}`;
  }

  function imgUrl(id, size = 600) {
    return `https://drive.google.com/thumbnail?id=${id}&sz=w${size}`;
  }

  // 그리드 패턴 선택
  function pickPattern(count) {
    if (count === 1) return "pattern-e";
    if (count === 2) return "pattern-f";
    if (count === 3) return Math.random() > 0.5 ? "pattern-a" : "pattern-b";
    if (count === 4) return Math.random() > 0.5 ? "pattern-c" : "pattern-d";
    if (count === 5 || count === 6) return count === 5 ? "pattern-g" : "pattern-h";
    return "pattern-many";
  }

  function buildCollage(photos, chapterIndex) {
    // 최대 12장씩 나눠서 콜라주 만들기
    const chunks = [];
    for (let i = 0; i < photos.length; i += 8) {
      chunks.push(photos.slice(i, i + 8));
    }

    return chunks.map(chunk => {
      const pattern = pickPattern(chunk.length);
      const grid = document.createElement("div");
      grid.className = `collage ${pattern}`;

      chunk.forEach((photo, i) => {
        const cell = document.createElement("div");
        cell.className = `photo-cell p${i}`;

        const wrap = document.createElement("div");
        wrap.className = "photo-img-wrap";

        const img = document.createElement("img");
        img.src = imgUrl(photo.id);
        img.alt = photo.name;
        img.loading = "lazy";

        const overlay = document.createElement("div");
        overlay.className = "overlay";

        wrap.appendChild(img);
        wrap.appendChild(overlay);
        cell.appendChild(wrap);

        const caption = document.createElement("div");
        caption.className = "photo-caption";
        caption.textContent = photo.name.replace(/\.[^.]+$/, "");
        cell.appendChild(caption);

        const globalIdx = flatPhotos.findIndex(p => p.id === photo.id);
        cell.addEventListener("click", () => openLightbox(globalIdx));
        grid.appendChild(cell);
      });

      return grid;
    });
  }

  function renderChapters(grouped) {
    const container = document.getElementById("chapters");
    container.innerHTML = "";

    let chapterNum = 1;

    for (const [key, photos] of Object.entries(grouped)) {
      // Chapter header
      const chapter = document.createElement("section");
      chapter.className = "chapter";

      const header = document.createElement("div");
      header.className = "chapter-header";
      header.innerHTML = `
        <div class="chapter-number">
          <span class="label">Chapter</span>
          <span class="num">${String(chapterNum).padStart(2,"0")}</span>
        </div>
        <div class="chapter-divider"></div>
        <div class="chapter-info">
          <div class="chapter-date">${formatChapterTitle(key)}</div>
          <div class="chapter-count">${photos.length}장의 사진</div>
        </div>
      `;
      chapter.appendChild(header);

      // Collages
      const collages = buildCollage(photos, chapterNum);
      collages.forEach(c => chapter.appendChild(c));

      container.appendChild(chapter);

      // Separator
      const sep = document.createElement("div");
      sep.className = "chapter-sep";
      sep.textContent = "✦";
      container.appendChild(sep);

      chapterNum++;
    }

    document.getElementById("footer").style.display = "block";
    document.getElementById("cover-sub").textContent =
      `총 ${flatPhotos.length}장 · ${Object.keys(grouped).length}개의 챕터`;
  }

  async function loadPhotos() {
    if (!CONFIG.API_KEY || !CONFIG.FOLDER_ID) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("setup-notice").style.display = "block";
      return;
    }

    try {
      let allFiles = [];
      let pageToken = "";

      do {
        const url = new URL("https://www.googleapis.com/drive/v3/files");
        url.searchParams.set("q", `'${CONFIG.FOLDER_ID}' in parents and mimeType contains 'image/' and trashed=false`);
        url.searchParams.set("fields", "nextPageToken, files(id, name, createdTime, modifiedTime, imageMediaMetadata)");
        url.searchParams.set("key", CONFIG.API_KEY);
        url.searchParams.set("pageSize", "100");
        url.searchParams.set("orderBy", "createdTime asc");
        if (pageToken) url.searchParams.set("pageToken", pageToken);

        const res = await fetch(url);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `API 오류 ${res.status}`);
        }
        const data = await res.json();
        allFiles = allFiles.concat(data.files || []);
        pageToken = data.nextPageToken || "";
      } while (pageToken);

      flatPhotos = allFiles;

      // 날짜별 그룹
      const grouped = {};
      for (const f of allFiles) {
      let rawDate = (f.imageMediaMetadata && f.imageMediaMetadata.time)
  ? f.imageMediaMetadata.time.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3')
  : f.createdTime;
const key = formatGroupKey(rawDate);
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(f);
      }

      document.getElementById("loading").style.display = "none";
      renderChapters(grouped);

    } catch (e) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error-msg").style.display = "block";
      document.getElementById("error-detail").textContent = e.message;
    }
  }

  // 라이트박스
  function openLightbox(idx) {
    currentLbIndex = idx;
    updateLb();
    document.getElementById("lightbox").classList.add("active");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
    document.body.style.overflow = "";
  }

  function updateLb() {
    const f = flatPhotos[currentLbIndex];
    document.getElementById("lb-img").src = imgUrl(f.id, 1600);
    document.getElementById("lb-info").textContent =
      `${formatDateLabel(f.createdTime)}  ·  ${currentLbIndex + 1} / ${flatPhotos.length}`;
  }

  document.getElementById("lb-close").addEventListener("click", closeLightbox);
  document.getElementById("lb-prev").addEventListener("click", () => {
    currentLbIndex = (currentLbIndex - 1 + flatPhotos.length) % flatPhotos.length;
    updateLb();
  });
  document.getElementById("lb-next").addEventListener("click", () => {
    currentLbIndex = (currentLbIndex + 1) % flatPhotos.length;
    updateLb();
  });
  document.getElementById("lightbox").addEventListener("click", e => {
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  });
  document.addEventListener("keydown", e => {
    if (!document.getElementById("lightbox").classList.contains("active")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") { currentLbIndex = (currentLbIndex - 1 + flatPhotos.length) % flatPhotos.length; updateLb(); }
    if (e.key === "ArrowRight") { currentLbIndex = (currentLbIndex + 1) % flatPhotos.length; updateLb(); }
  });

  loadPhotos();
</script>
</body>
</html>
